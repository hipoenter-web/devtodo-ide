services:
  - type: web
    name: devtodo-ide
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
